name: Deploy seep-api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

  deploy:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.LIGHTSAIL_PORT }}" "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.LIGHTSAIL_PORT }}" \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "mkdir -p /home/ubuntu/seep-api"

      - name: Sync API code without .env
        run: |
          rsync -az \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude ".github" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.LIGHTSAIL_PORT }}" \
            ./ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/seep-api/

      - name: Install production deps and restart service
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.LIGHTSAIL_PORT }}" \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
              cd /home/ubuntu/seep-api
              npm ci --omit=dev
              sudo systemctl restart seep-api
              sudo systemctl status seep-api --no-pager
          EOF
